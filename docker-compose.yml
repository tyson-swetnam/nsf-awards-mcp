version: '3.8'

services:
  # Main NSF Awards MCP Server
  nsf-awards-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VCS_REF: ${VCS_REF:-unknown}
        VERSION: ${VERSION:-1.0.0}
    image: nsf-awards-mcp:latest
    container_name: nsf-awards-mcp
    restart: unless-stopped

    # Environment configuration
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}

    # Volume mounts for logs and configuration
    volumes:
      - ./logs:/app/logs:rw
      - ./mcp-config.json:/app/mcp-config.json:ro

    # Network configuration
    ports:
      - "3000:3000"  # Health check endpoint

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Labels for organization
    labels:
      - "com.docker.compose.service=nsf-awards-mcp"
      - "app.name=nsf-awards-mcp"
      - "app.version=1.0.0"

  # Development service with hot reload
  nsf-awards-mcp-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: ts-builder
    image: nsf-awards-mcp:dev
    container_name: nsf-awards-mcp-dev

    # Override for development
    command: ["npm", "run", "dev"]

    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug

    # Mount source code for hot reload
    volumes:
      - .:/app:rw
      - /app/node_modules  # Anonymous volume for node_modules
      - ./logs:/app/logs:rw

    ports:
      - "3001:3000"  # Different port for dev

    # Development-specific settings
    stdin_open: true
    tty: true

    profiles:
      - dev  # Only start with --profile dev

  # Optional: Redis for caching (future enhancement)
  redis:
    image: redis:7-alpine
    container_name: nsf-awards-redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    ports:
      - "6379:6379"

    # Resource limits for Redis
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
        reservations:
          memory: 64M
          cpus: '0.1'

    profiles:
      - cache  # Only start with --profile cache

  # Optional: Monitoring with Prometheus (future enhancement)
  prometheus:
    image: prom/prometheus:latest
    container_name: nsf-awards-prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

    profiles:
      - monitoring  # Only start with --profile monitoring

# Named volumes for data persistence
volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local

# Networks for service isolation
networks:
  default:
    name: nsf-awards-network
    driver: bridge