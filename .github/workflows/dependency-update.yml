name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggers

jobs:
  # =============================================================================
  # Job 1: Dependency Audit and Security Check
  # =============================================================================
  security-audit:
    runs-on: ubuntu-latest
    name: Security Audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level high

      - name: Check for outdated packages
        run: npm outdated || true

      - name: Run Snyk test
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high

  # =============================================================================
  # Job 2: Automated Dependency Updates
  # =============================================================================
  update-dependencies:
    runs-on: ubuntu-latest
    name: Update Dependencies
    needs: security-audit
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Update patch and minor versions
        run: |
          # Update patch versions (safe updates)
          npm update

          # Check if there are changes
          if git diff --quiet package-lock.json; then
            echo "No dependency updates available"
            echo "UPDATES_AVAILABLE=false" >> $GITHUB_ENV
          else
            echo "Dependency updates found"
            echo "UPDATES_AVAILABLE=true" >> $GITHUB_ENV
          fi

      - name: Test updated dependencies
        if: env.UPDATES_AVAILABLE == 'true'
        run: |
          npm ci
          npm run type-check
          npm test
          npm run build

      - name: Create Pull Request
        if: env.UPDATES_AVAILABLE == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update dependencies

            Automated dependency updates:
            - Updated patch and minor versions
            - All tests passing
            - Type checking successful

            🤖 Generated by GitHub Actions
          title: 'chore: automated dependency updates'
          body: |
            ## 🤖 Automated Dependency Updates

            This PR contains automated updates to project dependencies:

            ### Changes
            - ⬆️ Updated patch and minor versions of npm packages
            - ✅ All tests are passing
            - ✅ Type checking successful
            - ✅ Build successful

            ### Security
            - 🛡️ No high or critical vulnerabilities detected
            - 🔍 Snyk security scan passed

            ### Review Notes
            - This PR was automatically generated
            - Only patch and minor version updates are included
            - Major version updates require manual review

            ---
            *Generated by the dependency-update workflow*
          branch: automated-dependency-updates
          delete-branch: true
          labels: |
            dependencies
            automated
            chore

  # =============================================================================
  # Job 3: Docker Base Image Updates
  # =============================================================================
  check-base-images:
    runs-on: ubuntu-latest
    name: Check Base Image Updates

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Node.js base image updates
        run: |
          echo "🔍 Checking for Node.js base image updates..."

          # Extract current Node.js version from Dockerfile
          CURRENT_NODE=$(grep "FROM node:" Dockerfile | head -1 | sed 's/.*node:\([^-]*\).*/\1/')
          echo "Current Node.js version in Dockerfile: $CURRENT_NODE"

          # Get latest LTS version (this is a simplified check)
          echo "Latest Node.js LTS versions available:"
          curl -s https://nodejs.org/dist/index.json | jq -r '.[] | select(.lts != false) | "\(.version) (LTS: \(.lts))"' | head -5

      - name: Check Alpine base image
        run: |
          echo "🔍 Checking Alpine Linux versions..."
          echo "Current Alpine-based images in Dockerfile:"
          grep "alpine" Dockerfile || echo "No Alpine images found"

  # =============================================================================
  # Job 4: License Compliance Check
  # =============================================================================
  license-check:
    runs-on: ubuntu-latest
    name: License Compliance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check license compliance
        run: |
          echo "📄 Checking license compliance..."
          npx license-checker --summary || {
            echo "license-checker not available, installing..."
            npm install -g license-checker
            npx license-checker --summary
          }

      - name: Detect potential license issues
        run: |
          echo "🔍 Scanning for problematic licenses..."
          npx license-checker --excludePackages 'nsf-awards-mcp@1.0.0' --onlyAllow 'MIT;ISC;BSD;Apache-2.0;CC0-1.0;Unlicense' || {
            echo "⚠️  Some dependencies may have restrictive licenses"
            echo "Manual review recommended"
          }