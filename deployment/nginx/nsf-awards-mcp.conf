# nginx configuration for NSF Awards MCP Server
# Provides reverse proxy, SSL termination, rate limiting, and security headers

# Upstream backend servers
upstream nsf_awards_mcp_backend {
    # Primary MCP server instance
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s weight=100;

    # Additional instances for load balancing (if deployed)
    # server 127.0.0.1:3001 max_fails=3 fail_timeout=30s weight=100;
    # server 127.0.0.1:3002 max_fails=3 fail_timeout=30s weight=100;

    # Enable keepalive connections
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=health_limit:10m rate=1r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Cache zone for static content (if any)
proxy_cache_path /var/cache/nginx/nsf-awards-mcp levels=1:2 keys_zone=nsf_cache:10m
                 max_size=1g inactive=60m use_temp_path=off;

# HTTP server (redirect to HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name nsf-awards-mcp.example.com;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nsf-awards-mcp.example.com;

    # SSL/TLS configuration
    ssl_certificate /etc/ssl/certs/nsf-awards-mcp.crt;
    ssl_certificate_key /etc/ssl/private/nsf-awards-mcp.key;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session configuration
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/ssl/certs/nsf-awards-mcp-chain.crt;

    # Resolver for OCSP
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), speaker=(), payment=()";

    # Remove nginx version from headers
    server_tokens off;

    # Logging
    access_log /var/log/nginx/nsf-awards-mcp.access.log combined;
    error_log /var/log/nginx/nsf-awards-mcp.error.log warn;

    # Connection limits
    limit_conn conn_limit 10;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Health check endpoint (high frequency)
    location /health {
        limit_req zone=health_limit burst=5 nodelay;

        proxy_pass http://nsf_awards_mcp_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Quick timeout for health checks
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;

        # No caching for health checks
        proxy_cache off;

        access_log off; # Reduce log noise
    }

    # Main MCP server endpoints
    location / {
        # Rate limiting for API endpoints
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy configuration
        proxy_pass http://nsf_awards_mcp_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Cache static content (if any)
        proxy_cache nsf_cache;
        proxy_cache_valid 200 302 10m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        # Add cache status header
        add_header X-Cache-Status $upstream_cache_status;
    }

    # API documentation (if served as static files)
    location /docs {
        alias /var/www/nsf-awards-mcp/docs;
        try_files $uri $uri/ =404;

        # Cache static documentation
        location ~* \.(html|css|js|png|jpg|jpeg|gif|svg|ico)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|config|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Robots.txt
    location /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
        add_header Content-Type text/plain;
    }

    # Favicon
    location /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        root /var/www/nsf-awards-mcp/error;
        internal;
    }

    location = /50x.html {
        root /var/www/nsf-awards-mcp/error;
        internal;
    }
}